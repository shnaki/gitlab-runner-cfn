AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM Role and Instance Profile for GitLab Runner.
  Requires CAPABILITY_IAM — deploy once with an administrator who has IAM permissions.
  The main stack (gitlab-runner.yaml) can then be deployed without IAM permissions.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  CacheBucketName:
    Type: String
    Default: ""
    Description: "Existing S3 bucket for runner distributed cache. Empty = no S3 policy."

  EcrPullRepositoryArns:
    Type: CommaDelimitedList
    Default: ""
    Description: >
      Comma-separated ECR repository ARNs that the runner may pull from.
      Leave empty to disable private ECR pull permissions.

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasCacheBucket: !Not [!Equals [!Ref CacheBucketName, ""]]
  HasEcrPullRepositories: !Not [!Equals [!Join ["", !Ref EcrPullRepositoryArns], ""]]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:
  RunnerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - !If
          - HasCacheBucket
          - PolicyName: runner-cache-bucket
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:PutObject
                    - s3:DeleteObject
                  Resource: !Sub "arn:${AWS::Partition}:s3:::${CacheBucketName}/*"
                - Effect: Allow
                  Action:
                    - s3:ListBucket
                    - s3:GetBucketLocation
                  Resource: !Sub "arn:${AWS::Partition}:s3:::${CacheBucketName}"
          - !Ref AWS::NoValue
        - !If
          - HasEcrPullRepositories
          - PolicyName: runner-ecr-pull
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - ecr:GetAuthorizationToken
                  Resource: "*"
                - Effect: Allow
                  Action:
                    - ecr:BatchCheckLayerAvailability
                    - ecr:BatchGetImage
                    - ecr:GetDownloadUrlForLayer
                  Resource: !Ref EcrPullRepositoryArns
          - !Ref AWS::NoValue

  RunnerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref RunnerRole]

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  RunnerInstanceProfileArn:
    Description: "ARN of the RunnerInstanceProfile. Pass this to the RunnerInstanceProfileArn parameter of gitlab-runner.yaml."
    Value: !GetAtt RunnerInstanceProfile.Arn
    Export:
      Name: !Sub "${AWS::StackName}-InstanceProfileArn"

  RunnerRoleArn:
    Description: "ARN of the RunnerRole"
    Value: !GetAtt RunnerRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"
