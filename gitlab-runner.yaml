AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GitLab Runner (Docker executor) on a single Spot EC2 instance.
  Targets an existing VPC/Subnet. Supports both private subnets (NAT Gateway)
  and public subnets (Internet Gateway with AssignPublicIp=Yes).
  Security Group can be either created here or reused from outside.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  # --- Network (existing VPC required) ---
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "Existing VPC ID to deploy the runner into."

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: >
      Existing Subnet ID.
      - Private subnet: requires NAT Gateway route for outbound.
      - Public subnet: set AssignPublicIp=Yes to assign a public IP via IGW.

  AssignPublicIp:
    Type: String
    AllowedValues: ["Yes", "No", "SubnetDefault"]
    Default: "No"
    Description: >
      Whether to associate a public IPv4 address to the runner ENI.
      - No (default): never assign a public IP. Requires the subnet to have
        an alternative egress path (NAT Gateway / VPC endpoints).
      - Yes: force-assign a public IP (subnet must have IGW route).
      - SubnetDefault: defer to the subnet's MapPublicIpOnLaunch setting.

  # --- Security Group ---
  ExistingSecurityGroupIds:
    Type: CommaDelimitedList
    Default: ""
    Description: >
      Comma-separated existing Security Group IDs to attach to the runner.
      When provided, a new SG is NOT created (useful when the self-hosted
      GitLab server has allowlisted a specific SG ID that you don't want to
      rotate). Leave empty to have this stack create its own SG.

  # --- GitLab Runner ---
  GitLabUrl:
    Type: String
    Default: "https://gitlab.example.com/"
    Description: "Self-hosted GitLab URL (must end with /)."

  RegistrationToken:
    Type: String
    NoEcho: true
    MinLength: 1
    Description: >
      Runner token used for registration.
      GitLab 14.2 uses a legacy registration token.
      Newer GitLab versions can use a runner authentication token (glrt-...).

  RunnerDescription:
    Type: String
    Default: "cfn-gitlab-runner"
    Description: "Description shown in GitLab Runners page."

  RunnerTags:
    Type: String
    Default: "aws,docker"
    Description: "Comma-separated tag list for this runner."

  RunnerConcurrent:
    Type: Number
    Default: 2
    MinValue: 1
    Description: "Max concurrent jobs for this runner process."

  RunnerDefaultDockerImage:
    Type: String
    Default: "alpine:latest"
    Description: "Default docker image when .gitlab-ci.yml does not set one."

  EcrDockerRegistries:
    Type: CommaDelimitedList
    Default: ""
    Description: >
      Comma-separated ECR registry hosts to configure for docker credential
      helper (for example 123456789012.dkr.ecr.ap-northeast-1.amazonaws.com).
      Leave empty to skip docker credential helper setup.

  RunnerPrivileged:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: "Run containers in privileged mode (required for DinD)."

  RunnerLocked:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: "Lock runner to the current project."

  RunnerRunUntagged:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: "Allow running jobs without tags."

  # --- Compute ---
  InstanceType:
    Type: String
    Default: "t3.small"
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - m6i.large
    Description: "EC2 instance type for the runner."

  SpotMaxPrice:
    Type: String
    Default: ""
    Description: "Max spot price (USD/hour). Empty = cap at on-demand price."

  VolumeSizeGiB:
    Type: Number
    Default: 50
    MinValue: 8
    Description: "Root EBS volume size in GiB."

  RunnerStateVolumeId:
    Type: String
    Default: ""
    Description: >
      Existing EBS volume ID for persistent runner state (/etc/gitlab-runner).
      Leave empty to create a new retained state volume in this stack.

  RunnerStateVolumeSizeGiB:
    Type: Number
    Default: 20
    MinValue: 8
    Description: >
      Size of the persistent runner-state EBS volume in GiB when
      RunnerStateVolumeId is empty.

  RunnerStateVolumeAvailabilityZone:
    Type: String
    Default: ""
    Description: >
      Availability Zone for a newly created runner-state EBS volume.
      Leave empty when using make deploy/changeset; the wrapper derives it
      from SubnetId automatically.

  AmiId:
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"
    Default: "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
    Description: "SSM public parameter resolving to the latest AL2023 AMI."

  # --- IAM ---
  IamStackName:
    Type: String
    Default: "gitlab-runner-iam"
    Description: >
      Name of the IAM stack (gitlab-runner-iam.yaml) that exports the
      RunnerInstanceProfileArn and optional CacheBucketName.

  # --- Access ---
  KeyPairName:
    Type: String
    Default: ""
    Description: "EC2 KeyPair name for optional SSH. Leave empty for SSM-only access."

  AllowedSshCidr:
    Type: String
    Default: ""
    Description: >
      CIDR allowed to SSH (e.g. 203.0.113.0/32). Ignored when
      ExistingSecurityGroupIds is set. Leave empty to disable SSH ingress.

  # --- Observability ---
  CloudWatchLogsRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 180, 365]
    Description: "Retention period (days) for CloudWatch Logs."

  # --- Storage / cache ---
  CacheBucketName:
    Type: String
    Default: ""
    Description: "Existing S3 bucket for runner distributed cache. Empty = no S3 policy."

  CacheBucketLocation:
    Type: String
    Default: ""
    Description: >
      AWS region of CacheBucketName. Empty = use the stack region.
      Ignored when CacheBucketName is empty.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Network" }
        Parameters: [VpcId, SubnetId, AssignPublicIp]
      - Label: { default: "Security Group" }
        Parameters: [ExistingSecurityGroupIds]
      - Label: { default: "IAM (deploy gitlab-runner-iam stack first)" }
        Parameters: [IamStackName]
      - Label: { default: "GitLab Runner" }
        Parameters:
          - GitLabUrl
          - RegistrationToken
          - RunnerDescription
          - RunnerTags
          - RunnerConcurrent
          - RunnerDefaultDockerImage
          - EcrDockerRegistries
          - RunnerPrivileged
          - RunnerLocked
          - RunnerRunUntagged
      - Label: { default: "Compute" }
        Parameters:
          - InstanceType
          - SpotMaxPrice
          - VolumeSizeGiB
          - RunnerStateVolumeId
          - RunnerStateVolumeSizeGiB
          - RunnerStateVolumeAvailabilityZone
          - AmiId
      - Label: { default: "Access" }
        Parameters: [KeyPairName, AllowedSshCidr]
      - Label: { default: "Cache" }
        Parameters: [CacheBucketName, CacheBucketLocation]
      - Label: { default: "Observability" }
        Parameters: [CloudWatchLogsRetentionDays]

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  # CommaDelimitedList cannot be compared directly; join and compare to "".
  ShouldCreateSecurityGroup:
    !Equals [!Join ["", !Ref ExistingSecurityGroupIds], ""]

  EnableSsh: !And
    - !Equals [!Join ["", !Ref ExistingSecurityGroupIds], ""]
    - !Not [!Equals [!Ref KeyPairName, ""]]
    - !Not [!Equals [!Ref AllowedSshCidr, ""]]

  HasExplicitCacheBucket: !Not [!Equals [!Ref CacheBucketName, ""]]
  HasCacheBucketLocation: !Not [!Equals [!Ref CacheBucketLocation, ""]]
  HasEcrDockerRegistries: !Not [!Equals [!Join ["", !Ref EcrDockerRegistries], ""]]
  HasSpotMaxPrice: !Not [!Equals [!Ref SpotMaxPrice, ""]]
  UseKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]
  HasExistingRunnerStateVolumeId: !Not [!Equals [!Ref RunnerStateVolumeId, ""]]
  ShouldCreateRunnerStateVolume: !Equals [!Ref RunnerStateVolumeId, ""]

  # AssignPublicIp mode switches
  UseSubnetDefault: !Equals [!Ref AssignPublicIp, "SubnetDefault"]
  AssignPublicIpExplicit: !Not [!Equals [!Ref AssignPublicIp, "SubnetDefault"]]
  AssignPublicIpYes: !Equals [!Ref AssignPublicIp, "Yes"]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:
  # --- CloudWatch Log Group ---
  RunnerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/${AWS::StackName}/runner"
      RetentionInDays: !Ref CloudWatchLogsRetentionDays

  # --- Security Group (conditional) ---
  RunnerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: ShouldCreateSecurityGroup
    Properties:
      GroupDescription: !Sub "${AWS::StackName} GitLab Runner SG"
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: "Allow all egress"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  RunnerSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: EnableSsh
    Properties:
      GroupId: !Ref RunnerSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !Ref AllowedSshCidr
      Description: "SSH from allowed CIDR"

  # --- Persistent runner state volume (conditional) ---
  RunnerStateVolume:
    Type: AWS::EC2::Volume
    Condition: ShouldCreateRunnerStateVolume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Ref RunnerStateVolumeAvailabilityZone
      Size: !Ref RunnerStateVolumeSizeGiB
      Encrypted: true
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-runner-state"

  # --- Launch Template ---
  RunnerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${AWS::StackName}-lt"
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn:
            Fn::ImportValue:
              Fn::Sub: "${IamStackName}-InstanceProfileArn"
        KeyName: !If [UseKeyPair, !Ref KeyPairName, !Ref AWS::NoValue]
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref VolumeSizeGiB
              VolumeType: gp3
              DeleteOnTermination: true
              Encrypted: true
        InstanceMarketOptions:
          MarketType: spot
          SpotOptions:
            SpotInstanceType: one-time
            MaxPrice: !If [HasSpotMaxPrice, !Ref SpotMaxPrice, !Ref AWS::NoValue]

        # When AssignPublicIp=SubnetDefault, use top-level SubnetId + SecurityGroupIds
        # so the subnet's MapPublicIpOnLaunch takes effect.
        SubnetId: !If [UseSubnetDefault, !Ref SubnetId, !Ref AWS::NoValue]
        SecurityGroupIds: !If
          - UseSubnetDefault
          - !If
            - ShouldCreateSecurityGroup
            - [!Ref RunnerSecurityGroup]
            - !Ref ExistingSecurityGroupIds
          - !Ref AWS::NoValue

        # When AssignPublicIp=Yes/No, use NetworkInterfaces to explicitly control.
        NetworkInterfaces: !If
          - AssignPublicIpExplicit
          - - DeviceIndex: 0
              AssociatePublicIpAddress: !If [AssignPublicIpYes, true, false]
              SubnetId: !Ref SubnetId
              Groups: !If
                - ShouldCreateSecurityGroup
                - [!Ref RunnerSecurityGroup]
                - !Ref ExistingSecurityGroupIds
          - !Ref AWS::NoValue

        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub "${AWS::StackName}-runner"
          - ResourceType: volume
            Tags:
              - Key: Name
                Value: !Sub "${AWS::StackName}-runner-volume"
        UserData:
          Fn::Base64:
            !Sub
              - |
                #!/bin/bash
                set -euo pipefail
                exec > >(tee -a /var/log/user-data.log) 2>&1

                cfn_signal() {
                  local exit_code=$1
                  echo "[user-data] signaling CloudFormation with exit code $exit_code"
                  /opt/aws/bin/cfn-signal -e "$exit_code" \
                    --stack ${AWS::StackName} \
                    --resource RunnerInstance \
                    --region ${AWS::Region}
                }
                trap 'exit_code=$?; cfn_signal "$exit_code"' EXIT

                echo "[user-data] installing packages"
                dnf -y update
                dnf -y install docker aws-cfn-bootstrap jq amazon-ecr-credential-helper amazon-cloudwatch-agent
                systemctl enable --now docker

                echo "[user-data] installing gitlab-runner"
                curl -fsSL "https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.rpm.sh" | bash
                dnf -y install gitlab-runner
                usermod -aG docker gitlab-runner

                echo "[user-data] waiting for persistent runner-state volume"
                ROOT_DEVICE="$(lsblk -no PKNAME "$(findmnt -n -o SOURCE /)" | head -n1)"
                STATE_DEVICE=""
                for _ in $(seq 1 60); do
                  STATE_DEVICE="$(lsblk -ndo NAME,TYPE | awk -v root="$ROOT_DEVICE" '$2=="disk" && $1 != root { print "/dev/" $1; exit }')"
                  if [ -n "$STATE_DEVICE" ]; then
                    break
                  fi
                  sleep 5
                done
                if [ -z "$STATE_DEVICE" ]; then
                  echo "[user-data] failed to find attached runner-state volume"
                  exit 1
                fi

                echo "[user-data] preparing persistent runner-state filesystem on $STATE_DEVICE"
                install -d -m 0755 /mnt/runner-state
                if ! blkid "$STATE_DEVICE" >/dev/null 2>&1; then
                  mkfs.ext4 -L runner-state "$STATE_DEVICE"
                fi
                STATE_UUID="$(blkid -s UUID -o value "$STATE_DEVICE")"
                grep -q " /mnt/runner-state " /etc/fstab || echo "UUID=$STATE_UUID /mnt/runner-state ext4 defaults,nofail 0 2" >> /etc/fstab
                mountpoint -q /mnt/runner-state || mount /mnt/runner-state

                install -d -m 0700 /mnt/runner-state/etc-gitlab-runner
                mountpoint -q /etc/gitlab-runner || mount --bind /mnt/runner-state/etc-gitlab-runner /etc/gitlab-runner
                grep -q " /etc/gitlab-runner " /etc/fstab || echo "/mnt/runner-state/etc-gitlab-runner /etc/gitlab-runner none bind 0 0" >> /etc/fstab

                if [ ! -f /etc/gitlab-runner/config.toml ]; then
                  echo "[user-data] creating base config.toml"
                  cat > /etc/gitlab-runner/config.toml <<TOML
                concurrent = ${RunnerConcurrent}
                check_interval = 0
                TOML
                else
                  echo "[user-data] reusing existing config.toml"
                  if grep -q '^concurrent *=.*' /etc/gitlab-runner/config.toml; then
                    sed -i 's/^concurrent *=.*/concurrent = ${RunnerConcurrent}/' /etc/gitlab-runner/config.toml
                  else
                    printf 'concurrent = ${RunnerConcurrent}\n%s' "$(cat /etc/gitlab-runner/config.toml)" > /etc/gitlab-runner/config.toml.tmp
                    mv /etc/gitlab-runner/config.toml.tmp /etc/gitlab-runner/config.toml
                  fi
                  if grep -q '^check_interval *=.*' /etc/gitlab-runner/config.toml; then
                    sed -i 's/^check_interval *=.*/check_interval = 0/' /etc/gitlab-runner/config.toml
                  else
                    printf 'check_interval = 0\n%s' "$(cat /etc/gitlab-runner/config.toml)" > /etc/gitlab-runner/config.toml.tmp
                    mv /etc/gitlab-runner/config.toml.tmp /etc/gitlab-runner/config.toml
                  fi
                fi
                chmod 0600 /etc/gitlab-runner/config.toml

                echo "[user-data] writing runner registration template"
                cat > /etc/gitlab-runner/register-template.toml <<TOML
                [[runners]]
                  [runners.docker]
                    image = "${RunnerDefaultDockerImage}"
                    privileged = ${RunnerPrivileged}
                    volumes = ["/cache"]
                TOML

                if [ -n "${ResolvedCacheBucketName}" ]; then
                  cat >> /etc/gitlab-runner/register-template.toml <<TOML
                  [runners.cache]
                    Type = "s3"
                    Path = "gitlab-runner"
                    Shared = true
                    [runners.cache.s3]
                      BucketName = "${ResolvedCacheBucketName}"
                      BucketLocation = "${ResolvedCacheBucketLocation}"
                      AuthenticationType = "iam"
                  TOML
                fi
                chmod 0600 /etc/gitlab-runner/register-template.toml

                if [ "${EnableEcrDockerHelper}" = "true" ]; then
                  echo "[user-data] configuring docker credential helper for ECR"
                  install -d -m 0700 -o gitlab-runner -g gitlab-runner /home/gitlab-runner/.docker
                  REGISTRIES_JSON=$(
                    printf '%s\n' "${JoinedEcrDockerRegistries}" |
                      tr ',' '\n' |
                      sed -e 's/^ *//' -e 's/ *$//' -e '/^$/d' |
                      jq -R . |
                      jq -s '{credHelpers: (map({key: ., value: "ecr-login"}) | from_entries)}'
                  )
                  printf '%s\n' "$REGISTRIES_JSON" > /home/gitlab-runner/.docker/config.json
                  chown gitlab-runner:gitlab-runner /home/gitlab-runner/.docker/config.json
                  chmod 0600 /home/gitlab-runner/.docker/config.json
                fi

                if grep -q '^\[\[runners\]\]' /etc/gitlab-runner/config.toml; then
                  echo "[user-data] existing runner registration found; skipping register"
                else
                  if [[ "${RegistrationToken}" == glrt-* ]]; then
                    echo "[user-data] registering runner with authentication token"
                    echo "[user-data] runner attributes such as description, tags, locked, and run-untagged must be configured in GitLab UI or API"
                    gitlab-runner register \
                      --non-interactive \
                      --url "${GitLabUrl}" \
                      --token "${RegistrationToken}" \
                      --template-config /etc/gitlab-runner/register-template.toml \
                      --executor "docker" \
                      --docker-image "${RunnerDefaultDockerImage}"
                  else
                    echo "[user-data] registering runner with legacy registration token"
                    gitlab-runner register \
                      --non-interactive \
                      --url "${GitLabUrl}" \
                      --registration-token "${RegistrationToken}" \
                      --template-config /etc/gitlab-runner/register-template.toml \
                      --executor "docker" \
                      --docker-image "${RunnerDefaultDockerImage}" \
                      --description "${RunnerDescription}" \
                      --tag-list "${RunnerTags}" \
                      --locked=${RunnerLocked} \
                      --run-untagged=${RunnerRunUntagged}
                  fi
                fi

                systemctl enable --now gitlab-runner

                echo "[user-data] configuring cloudwatch agent"
                cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<CW_EOF
                {
                  "logs": {
                    "logs_collected": {
                      "files": {
                        "collect_list": [
                          {
                            "file_path": "/var/log/user-data.log",
                            "log_group_name": "/${AWS::StackName}/runner",
                            "log_stream_name": "{instance_id}/user-data",
                            "timezone": "UTC"
                          }
                        ]
                      },
                      "journald": {
                        "collect_list": [
                          {
                            "log_group_name": "/${AWS::StackName}/runner",
                            "log_stream_name": "{instance_id}/gitlab-runner",
                            "units": ["gitlab-runner.service"],
                            "timezone": "UTC"
                          }
                        ]
                      }
                    }
                  }
                }
                CW_EOF
                /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
                  -a fetch-config -m ec2 \
                  -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
              - EnableEcrDockerHelper: !If [HasEcrDockerRegistries, "true", "false"]
                JoinedEcrDockerRegistries: !If [HasEcrDockerRegistries, !Join [",", !Ref EcrDockerRegistries], ""]
                ResolvedCacheBucketName: !If
                  - HasExplicitCacheBucket
                  - !Ref CacheBucketName
                  - Fn::ImportValue:
                      Fn::Sub: "${IamStackName}-CacheBucketName"
                ResolvedCacheBucketLocation: !If [HasCacheBucketLocation, !Ref CacheBucketLocation, !Ref AWS::Region]

  # --- EC2 Instance ---
  RunnerInstance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT15M
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref RunnerLaunchTemplate
        Version: !GetAtt RunnerLaunchTemplate.LatestVersionNumber
      Volumes:
        - Device: /dev/sdf
          VolumeId: !If
            - HasExistingRunnerStateVolumeId
            - !Ref RunnerStateVolumeId
            - !Ref RunnerStateVolume
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-runner"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  InstanceId:
    Description: "EC2 instance ID"
    Value: !Ref RunnerInstance

  PrivateIp:
    Description: "Private IPv4 of the runner"
    Value: !GetAtt RunnerInstance.PrivateIp

  VpcIdUsed:
    Description: "VPC used by the runner"
    Value: !Ref VpcId

  SubnetIdUsed:
    Description: "Subnet used by the runner"
    Value: !Ref SubnetId

  SecurityGroupIds:
    Description: "Security Group IDs attached to the runner"
    Value: !If
      - ShouldCreateSecurityGroup
      - !Ref RunnerSecurityGroup
      - !Join [",", !Ref ExistingSecurityGroupIds]

  EcrDockerRegistriesConfigured:
    Description: "ECR registry hosts configured for docker credential helper"
    Value: !If
      - HasEcrDockerRegistries
      - !Join [",", !Ref EcrDockerRegistries]
      - ""

  SsmSessionCommand:
    Description: "One-liner to open an SSM Session Manager shell"
    Value: !Sub "aws ssm start-session --region ${AWS::Region} --target ${RunnerInstance}"

  CloudWatchLogGroupName:
    Description: "CloudWatch Log Group for runner logs"
    Value: !Ref RunnerLogGroup

  RunnerStateVolumeIdUsed:
    Description: "Persistent EBS volume ID used for /etc/gitlab-runner"
    Value: !If
      - HasExistingRunnerStateVolumeId
      - !Ref RunnerStateVolumeId
      - !Ref RunnerStateVolume
